<div class="muni-buscar-host">
  <label>{{ label }}</label>
  <div class="input-wrap" [class.combo]="modoCombo">
    <input
      type="text"
      [placeholder]="placeholder"
      [ngModel]="query()"
      (ngModelChange)="onInput($event)"
      (focus)="focus()"
      autocomplete="off"
    />
    <button
      *ngIf="modoCombo"
      type="button"
      class="combo-toggle"
      tabindex="-1"
      [attr.aria-expanded]="open()"
      (mousedown)="$event.preventDefault()"
      (click)="toggleOpen()">
      ▾
    </button>
    <span class="hint" *ngIf="loading()">Buscando…</span>
  </div>

  <ul class="dropdown" *ngIf="open() && resultados().length > 0">
    <li *ngFor="let m of resultados()" (mousedown)="pick(m)">
      <strong>{{ m.nombreMunicipio }}</strong>
      <span>{{ m.nombreDepto }} · {{ m.codMunicipio }}</span>
    </li>
  </ul>

  <div
    class="dropdown empty"
    *ngIf="open() && !loading() && query().trim().length >= minBusqueda() && resultados().length === 0"
  >
    No hay municipios con ese texto.
  </div>

  <div
    class="dropdown empty"
    *ngIf="open() && query().trim().length > 0 && query().trim().length < minBusqueda()"
  >
    Escriba al menos {{ minBusqueda() }} caracteres…
  </div>

  <div class="dropdown empty" *ngIf="open() && modoCombo && !query().trim() && !loading()">
    Escriba municipio o departamento para buscar.
  </div>
</div>
