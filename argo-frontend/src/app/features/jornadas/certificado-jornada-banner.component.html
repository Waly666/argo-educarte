<argo-head-alarm-list-banner
  [visible]="visible()"
  theme="hal-theme-cert-jornada"
  icon="🎓"
  [title]="'Certificados emitidos (' + rows().length + ')'"
  hint="Pulse una fila para imprimir el certificado."
  [items]="rows()"
  [itemDismissible]="true"
  (closed)="cerrar()"
  (itemClick)="onItemClick($event)"
  (itemDismiss)="onItemDismiss($event)"
/>
