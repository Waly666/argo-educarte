@if (svc.state(); as s) {
  <div
    class="cd-backdrop"
    role="presentation"
    (click)="svc.cancel()"
    @backdropAnim></div>

  <div
    class="cd-dialog"
    [class]="'variant-' + s.variant"
    role="alertdialog"
    aria-modal="true"
    [attr.aria-labelledby]="'cd-title'"
    [attr.aria-describedby]="'cd-message'"
    (click)="$event.stopPropagation()"
    @dialogAnim>
    <div class="cd-icon-wrap" aria-hidden="true">
      <span class="cd-dot cd-dot-1"></span>
      <span class="cd-dot cd-dot-2"></span>
      <span class="cd-dot cd-dot-3"></span>
      <span class="cd-dot cd-dot-4"></span>
      <span class="cd-dot cd-dot-5"></span>
      <div class="cd-icon-ring">
        @switch (s.icon) {
          @case ('delete') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14Z"/>
              <path d="M10 11v6M14 11v6"/>
            </svg>
          }
          @case ('warning') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M12 9v4M12 17h.01"/>
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
            </svg>
          }
          @case ('check') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          }
          @case ('print') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <path d="M6 14h12v8H6z"/>
            </svg>
          }
          @default {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
          }
        }
      </div>
    </div>

    <h2 id="cd-title" class="cd-title">{{ s.title }}</h2>
    <p id="cd-message" class="cd-message">{{ s.message }}</p>

    @if (s.input; as inp) {
      <label class="cd-input-wrap">
        @if (inp.label) {
          <span class="cd-input-label">{{ inp.label }}</span>
        }
        <input
          class="cd-input"
          [type]="inp.type"
          [value]="inp.value"
          (input)="svc.setInputValue($any($event.target).value)"
          (keydown.enter)="svc.confirm()" />
      </label>
    }

    <div class="cd-actions" [class.single]="s.hideCancel">
      @if (!s.hideCancel) {
        <button type="button" class="cd-btn cd-btn-cancel" (click)="svc.cancel()">{{ s.cancelLabel }}</button>
      }
      <button type="button" class="cd-btn cd-btn-confirm" (click)="svc.confirm()">{{ s.confirmLabel }}</button>
    </div>
  </div>
}
