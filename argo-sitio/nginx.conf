server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /videos/ {
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
