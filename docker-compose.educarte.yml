# Educarte — stack Docker por IP pública (sin dominio).
# ERP :8083 | Portal aula :8085 | API directa :5002
#
# En el VPS:
#   ./deploy/setup-educarte-ip-env.sh TU_IP
#   ./deploy/deploy-educarte-ip.sh
#
name: argo-educarte

services:
  argo-mongo:
    image: mongo:6
    container_name: argo-educarte-mongo
    restart: unless-stopped
    volumes:
      - argo_educarte_mongo:/data/db
    networks:
      - argo-educarte-net
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  argo-backend:
    build:
      context: ./argo-backend
      dockerfile: Dockerfile
    container_name: argo-educarte-backend
    restart: unless-stopped
    ports:
      - '5002:3000'
    environment:
      TZ: America/Bogota
    env_file:
      - ./deploy/.env
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
    depends_on:
      argo-mongo:
        condition: service_started
    networks:
      - argo-educarte-net
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 25s
      timeout: 10s
      retries: 8
      start_period: 60s

  argo-frontend:
    build:
      context: ./argo-frontend
      dockerfile: Dockerfile
    container_name: argo-educarte-frontend
    restart: unless-stopped
    ports:
      - '8083:80'
    depends_on:
      argo-backend:
        condition: service_started
    networks:
      - argo-educarte-net

  argo-aula-virtual:
    build:
      context: ./argo-aula-virtual
      dockerfile: Dockerfile
      args:
        PORTAL_BUILD_ID: ${PORTAL_BUILD_ID:-unknown}
    container_name: argo-educarte-aula
    restart: unless-stopped
    ports:
      - '8085:80'
    volumes:
      # APK subido por ERP → backend/uploads; copia opcional aquí para nginx estático
      - ./apk:/usr/share/nginx/html/apk:ro
    depends_on:
      argo-backend:
        condition: service_started
    networks:
      - argo-educarte-net

volumes:
  argo_educarte_mongo:

networks:
  argo-educarte-net:
    driver: bridge
