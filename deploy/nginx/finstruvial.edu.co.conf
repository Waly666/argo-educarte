# Portal aula virtual — proxy al contenedor argo-aula-virtual (:8085)
# Instalar: deploy/setup-nginx-ssl.sh (Certbot añade listen 443 ssl)

server {
    listen 80;
    listen [::]:80;
    server_name finstruvial.edu.co www.finstruvial.edu.co;

    client_max_body_size 250m;
    include /opt/argo/deploy/nginx/snippets/argo-security-headers.conf;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
