# Parche visual Educarte cuando el contenedor del portal aún no se reconstruyó.
# Inyecta skin + CSS crítico (header/footer/hero base) vía nginx sub_filter.
proxy_set_header Accept-Encoding "";

sub_filter_types text/html;
sub_filter_once off;
sub_filter '<html lang="es-CO"' '<html lang="es-CO" data-portal-skin="educarte"';
sub_filter '<html lang="es-CO" data-beasties-container' '<html lang="es-CO" data-portal-skin="educarte" data-beasties-container';
sub_filter '<html lang="es-CO" data-portal-skin="educarte" data-beasties-container' '<html lang="es-CO" data-portal-skin="educarte" data-beasties-container';
sub_filter '</head>' '<style id="educarte-nginx-critical">html[data-portal-skin="educarte"],html[data-portal-skin=educarte]{--av-bg:#fdfbf7;--av-text:#1a2e24;--av-primary:#0b4d3c;--av-primary-dark:#063828;--av-accent:#c5a059}html[data-portal-skin="educarte"] body,html[data-portal-skin=educarte] body{background:#fdfbf7!important;color:#1a2e24!important}html[data-portal-skin="educarte"] av-shell .topbar,html[data-portal-skin=educarte] av-shell .topbar{background:rgba(6,56,40,.96)!important;border-bottom-color:rgba(197,160,89,.28)!important}html[data-portal-skin="educarte"] av-shell .nav a,html[data-portal-skin=educarte] av-shell .nav a{color:rgba(253,251,247,.94)!important}html[data-portal-skin="educarte"] av-shell .site-footer,html[data-portal-skin=educarte] av-shell .site-footer{background:#063828!important;color:#fdfbf7!important}html[data-portal-skin="educarte"] av-shell .site-footer__title,html[data-portal-skin=educarte] av-shell .site-footer__title{color:#fdfbf7!important}html[data-portal-skin="educarte"] av-shell .site-footer__links a,html[data-portal-skin=educarte] av-shell .site-footer__links a{color:rgba(253,251,247,.92)!important}html[data-portal-skin="educarte"] .hero--educarte,html[data-portal-skin=educarte] .hero--educarte{background:url(/images/fondo-hero-educarte.png) center top/cover no-repeat,linear-gradient(180deg,rgba(253,251,247,.7),#f5f0e8)!important}</style></head>';

add_header Cache-Control "no-cache, no-store, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header X-Educarte-Portal-Inject "1" always;
